<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Cocina Premium</title>
    <style>
        :root {
            --primary: #c62828;
            --primary-dark: #8e0000;
            --bg: #f8f9fa;
            --card-bg: #ffffff;
            --text: #212121;
            --text-light: #616161;
            --success: #2e7d32;
            --border: #e0e0e0;
            --shadow: 0 4px 6px rgba(0,0,0,0.1);
            --radius: 10px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: var(--bg); color: var(--text); line-height: 1.5; }
        
        header {
            background: var(--primary); color: white; padding: 1rem; text-align: center;
            position: sticky; top: 0; z-index: 100;
        }
        header h1 { font-size: 1.4rem; margin: 0; }
        header p { font-size: 0.9rem; opacity: 0.9; margin-top: 4px; }
        
        .category-filters {
            display: flex; gap: 8px; padding: 1rem; overflow-x: auto;
            background: white; border-bottom: 1px solid var(--border);
            position: sticky; top: 70px; z-index: 99;
        }
        .cat-filter-btn {
            padding: 8px 16px; border: 1px solid var(--border); border-radius: 20px;
            background: white; cursor: pointer; white-space: nowrap; font-size: 0.9rem;
            transition: 0.2s;
        }
        .cat-filter-btn:hover { background: var(--bg); }
        .cat-filter-btn.active {
            background: var(--primary); color: white; border-color: var(--primary);
        }

        .catalog {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem;
            padding: 1.5rem; max-width: 1200px; margin: 0 auto;
        }
        .card { 
            background: white; border-radius: var(--radius); overflow: hidden; 
            box-shadow: var(--shadow); transition: 0.2s; display: flex; flex-direction: column; 
        }
        .card:hover { transform: translateY(-4px); }
        .card-img-wrap { 
            position: relative; height: 220px; background: #eee; cursor: pointer; 
        }
        .card-img-wrap img { 
            width: 100%; height: 100%; object-fit: cover; 
        }
        .img-counter { 
            position: absolute; bottom: 8px; right: 8px; 
            background: rgba(0,0,0,0.7); color: white; 
            padding: 3px 8px; border-radius: 15px; font-size: 0.8rem; 
        }
        .card-body { padding: 1rem; flex: 1; display: flex; flex-direction: column; }
        .card-category { 
            font-size: 0.75rem; color: var(--primary); font-weight: 600; 
            text-transform: uppercase; margin-bottom: 5px; 
        }
        .card-price { 
            font-size: 1.3rem; font-weight: bold; color: var(--success); 
            margin: 10px 0; 
        }
        .card-actions { display: flex; gap: 8px; margin-top: auto; }
        .card-actions .btn { 
            flex: 1; padding: 10px; border: none; border-radius: 6px; 
            font-weight: 600; cursor: pointer; transition: 0.2s; font-size: 0.95rem; 
        }
        .btn-success { background: var(--success); color: white; }
        .btn-success:hover { background: #1b5e20; }

        .gallery-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 2000; display: none;
            flex-direction: column; align-items: center; justify-content: center;
        }
        .gallery-modal.active { display: flex; }
        .gallery-img { max-width: 95%; max-height: 70vh; object-fit: contain; border-radius: 8px; }
        .gallery-nav {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: rgba(255,255,255,0.2); color: white; border: none;
            width: 50px; height: 50px; border-radius: 50%; font-size: 2rem;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: 0.2s;
        }
        .gallery-nav:hover { background: rgba(255,255,255,0.4); }
        .gallery-prev { left: 20px; }
        .gallery-next { right: 20px; }
        .gallery-close {
            position: absolute; top: 20px; right: 20px;
            background: rgba(255,255,255,0.2); border: none; color: white;
            width: 40px; height: 40px; border-radius: 50%; font-size: 1.5rem;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        .gallery-counter {
            color: white; margin-top: 15px; font-size: 1rem;
            background: rgba(0,0,0,0.6); padding: 8px 20px; border-radius: 20px;
        }
        .gallery-thumbs {
            display: flex; gap: 10px; margin-top: 15px; overflow-x: auto;
            max-width: 90%; padding: 5px;
        }
        .gallery-thumbs img {
            width: 60px; height: 60px; object-fit: cover; border-radius: 6px;
            cursor: pointer; border: 3px solid transparent; opacity: 0.6;
            transition: 0.2s;
        }
        .gallery-thumbs img.active {
            border-color: var(--primary); opacity: 1; transform: scale(1.1);
        }

        @media (max-width: 600px) {
            .catalog { grid-template-columns: 1fr; padding: 1rem; }
            .category-filters { top: 60px; }
        }
    </style>
</head>

        // ==================== LÓGICA DEL CATÁLOGO ====================
        let currentFilter = "Todas";
        let galImages = [], galIdx = 0;

        function getCategoryById(id) {
            return CATEGORIES.find(c => c.id === id);
        }

        function renderCategoryFilters() {
            const container = document.getElementById("category-filters");
            container.innerHTML = "";
            
            const allBtn = document.createElement("button");
            allBtn.className = "cat-filter-btn" + (currentFilter === "Todas" ? " active" : "");
            allBtn.textContent = "📦 Todas";
            allBtn.onclick = () => setFilter("Todas");
            container.appendChild(allBtn);
            
            CONFIG.activeCategories.forEach(catId => {
                const cat = getCategoryById(catId);
                if (!cat) return;
                const btn = document.createElement("button");
                btn.className = "cat-filter-btn" + (currentFilter === catId ? " active" : "");
                btn.textContent = cat.label;
                btn.onclick = () => setFilter(catId);
                container.appendChild(btn);
            });
        }

        function setFilter(cat) {
            currentFilter = cat;
            renderCategoryFilters();
            renderCatalog();
        }

        function renderCatalog() {
            const cont = document.getElementById("catalog");
            cont.innerHTML = "";
            
            let filtered = PRODUCTS.filter(p => {
                if (p.enabled === false) return false;
                if (!CONFIG.activeCategories.includes(p.category)) return false;
                if (currentFilter !== "Todas" && p.category !== currentFilter) return false;
                return true;
            });

            if (filtered.length === 0) {
                cont.innerHTML = `<p style="grid-column:1/-1; text-align:center; color:#666; padding:2rem;">🛍️ Pronto tendremos productos en esta categoría</p>`;
                return;
            }

            filtered.forEach(p => {
                const cat = getCategoryById(p.category);
                let imgs = (p.images || []).filter(img => img && img.trim() !== "");
                if (imgs.length === 0) imgs = ["images/placeholder.jpg"];
                
                cont.innerHTML += `
                    <div class="card">
                        <div class="card-img-wrap" onclick="openGallery('${p.id}')">
                            <img src="${imgs[0]}" alt="${p.name}" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNDAwIiBoZWlnaHQ9IjMwMCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWxsPSIjZWVlIi8+PHRleHQgeD0iNTAlIiB5PSI1MCUiIGZvbnQtc2l6ZT0iMjAiIHRleHQtYW5jaG9yPSJtaWRkbGUiIGR5PSIuM2VtIiBmaWxsPSIjOTk5Ij5TaW4gSW1hZ2VuPC90ZXh0Pjwvc3ZnPg=='">
                            ${imgs.length > 1 ? `<div class="img-counter">📷 ${imgs.length}</div>` : ''}
                        </div>
                        <div class="card-body">
                            <div class="card-category">${cat ? cat.label : p.category}</div>
                            <div style="font-weight:600; margin-bottom:5px;">${p.name || 'Sin nombre'}</div>
                            <div style="font-size:0.9rem; color:#666; flex:1;">${p.desc || ""}</div>
                            <div class="card-price">$${Number(p.price || 0).toFixed(2)}</div>
                            <div class="card-actions">
                                <button class="btn btn-success" onclick="contactWA('${(p.name || 'Producto').replace(/'/g, "\\'")}', '${p.price || '0'}')">📲 Consultar por WhatsApp</button>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function contactWA(n, p) {
            const msg = `Hola, me interesa: *${n}* ($${p}). ¿Disponible?`;
            window.open(`https://wa.me/${CONFIG.whatsapp}?text=${encodeURIComponent(msg)}`, "_blank");
        }

        function openGallery(id) {
            const p = PRODUCTS.find(x => x.id === id);
            if (!p || !p.images || p.images.length === 0) return;
            
            galImages = p.images.filter(img => img && img.trim() !== "");
            if (galImages.length === 0) return;
            
            galIdx = 0;
            updateGal();
            document.getElementById("gallery").classList.add("active");
            document.body.style.overflow = "hidden";
        }

        function updateGal() {
            if (!galImages.length) return;
            document.getElementById("gal-img").src = galImages[galIdx];
            document.getElementById("gal-counter").textContent = `${galIdx + 1} / ${galImages.length}`;
            
            const thumbs = document.getElementById("gal-thumbs");
            thumbs.innerHTML = "";
            galImages.forEach((src, i) => {
                const img = document.createElement("img");
                img.src = src;
                img.onerror = function() { this.src = 'images/placeholder.jpg'; };
                if (i === galIdx) img.classList.add("active");
                img.onclick = () => { galIdx = i; updateGal(); };
                thumbs.appendChild(img);
            });
        }

        function navImg(d) {
            if (!galImages.length) return;
            galIdx = (galIdx + d + galImages.length) % galImages.length;
            updateGal();
        }

        function closeGallery() { 
            document.getElementById("gallery").classList.remove("active"); 
            document.body.style.overflow = "auto";
        }

        document.addEventListener("DOMContentLoaded", () => {
            renderCategoryFilters();
            renderCatalog();
        });

        document.addEventListener("keydown", e => {
            if (document.getElementById("gallery").classList.contains("active")) {
                if (e.key === "Escape") closeGallery();
                if (e.key === "ArrowLeft") navImg(-1);
                if (e.key === "ArrowRight") navImg(1);
            }
        });
    </script>
